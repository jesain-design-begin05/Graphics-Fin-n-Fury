<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" preserveAspectRatio="xMidYMid meet">
  <!-- White background for clean sprite-sheet use -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00224d" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
  </defs>

  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="'Press Start 2P', monospace" font-size="72" font-weight="900"
        fill="url(#oceanGrad)" stroke="#000000" stroke-width="8" paint-order="stroke"
        text-rendering="optimizeSpeed" shape-rendering="crispEdges" letter-spacing="6">
    GAME OVER
  </text>
</svg>
